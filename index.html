<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>健身计划 · 第一个月</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07080f;--bg2:#0d0e1a;--bg3:#111220;
  --sf:rgba(255,255,255,0.042);--sf2:rgba(255,255,255,0.07);--sf3:rgba(255,255,255,0.1);
  --br:rgba(255,255,255,0.08);--br2:rgba(255,255,255,0.14);
  --acc:#00d4a8;--acc-d:rgba(0,212,168,0.11);--acc-b:rgba(0,212,168,0.28);
  --ora:#ff7847;--ora-d:rgba(255,120,71,0.11);--ora-b:rgba(255,120,71,0.25);
  --red:#ff4d6a;--red-d:rgba(255,77,106,0.1);
  --yel:#f5c518;
  --t1:#e4e8f4;--t2:#8b90ac;--t3:#4e5270;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --r:16px;--rs:10px;--rss:6px
}
body{background:var(--bg);color:var(--t1);font-family:var(--fb);min-height:100vh;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:100px}

/* HEADER */
.app-header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--br)}
.app-logo{display:flex;flex-direction:column}
.app-title{font-family:var(--fh);font-size:17px;font-weight:800;color:var(--acc);letter-spacing:-0.3px}
.app-sub{font-size:11px;color:var(--t3);margin-top:1px}
.settings-btn{background:var(--sf);border:1px solid var(--br);color:var(--t2);padding:7px 13px;border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;gap:5px}

/* SETTINGS */
.settings-panel{background:var(--bg2);border-bottom:1px solid var(--br);padding:16px 20px;display:none}
.settings-panel.open{display:block}
.settings-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.settings-label{font-size:12px;color:var(--t2);min-width:68px;font-weight:500}
.settings-input{flex:1;background:var(--bg3);border:1px solid var(--br2);color:var(--t1);padding:9px 12px;border-radius:var(--rs);font-size:14px;font-family:var(--fb);-webkit-appearance:none;appearance:none;color-scheme:dark}
.settings-input:focus{outline:none;border-color:var(--acc)}
.week-pills{display:flex;gap:6px;flex:1}
.week-pill{flex:1;text-align:center;padding:9px 4px;border-radius:var(--rs);font-size:14px;font-weight:600;background:var(--bg3);border:1px solid var(--br);color:var(--t2);cursor:pointer;font-family:var(--fh);transition:all .2s}
.week-pill.active{background:var(--acc-d);border-color:var(--acc-b);color:var(--acc)}
.settings-note{font-size:12px;color:var(--t3);line-height:1.5;padding:10px;background:var(--sf);border-radius:var(--rss);margin-top:4px}

/* PROGRESS */
.progress-wrap{padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--br)}
.progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:5px}
.progress-count{color:var(--acc);font-weight:600}
.progress-track{height:3px;background:var(--sf2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--acc),#00efc0);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}

/* TABS */
.day-tabs-wrap{background:var(--bg);padding:12px 20px 0;border-bottom:1px solid var(--br);position:sticky;top:57px;z-index:90}
.day-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:12px}
.day-tabs::-webkit-scrollbar{display:none}
.day-tab{flex:none;padding:7px 14px;border-radius:99px;font-size:13px;font-weight:600;font-family:var(--fb);background:var(--sf);border:1px solid var(--br);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.day-tab .tab-label{font-size:13px;font-weight:600}
.day-tab .tab-dot{width:4px;height:4px;border-radius:50%;background:transparent;transition:background .2s}
.day-tab.training{color:var(--t1)}
.day-tab.today{border-color:var(--acc-b)}
.day-tab.today .tab-dot{background:var(--acc)}
.day-tab.active{background:var(--acc);border-color:var(--acc);color:var(--bg)}
.day-tab.active .tab-dot{background:var(--bg)}

/* CONTENT */
#content{padding:16px 20px 0;max-width:600px;margin:0 auto}

/* DAY HEADER */
.day-hdr{padding:4px 0 12px}
.day-hdr-top{display:flex;align-items:flex-start;justify-content:space-between}
.day-hdr-title{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--t1);line-height:1.1}
.day-hdr-date{font-size:12px;color:var(--t3);margin-top:4px}
.day-hdr-theme{font-size:13px;color:var(--acc);margin-top:4px;font-weight:500}
.phase-badge{background:var(--ora-d);border:1px solid var(--ora-b);color:var(--ora);padding:4px 11px;border-radius:99px;font-size:11px;font-weight:700;font-family:var(--fh);white-space:nowrap;margin-top:4px;display:inline-block}
.week-note-box{background:var(--sf);border:1px solid var(--br);border-left:3px solid var(--ora);border-radius:var(--rs);padding:10px 14px;font-size:13px;color:var(--t2);margin-bottom:14px;line-height:1.55}

/* SECTION HDR */
.sec-hdr{display:flex;align-items:center;gap:10px;margin:20px 0 10px}
.sec-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sec-title{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--t1)}
.sec-sub{font-size:11px;color:var(--t3)}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:8px;overflow:hidden}

/* MEAL */
.meal-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 10px}
.meal-name{font-weight:600;font-size:15px}
.meal-time{font-size:11px;color:var(--t3);margin-top:2px}
.meal-badges{display:flex;gap:8px;padding:0 16px 10px;flex-wrap:wrap}
.mbadge{background:var(--bg2);padding:4px 10px;border-radius:99px;font-size:12px;color:var(--t2)}
.mbadge .mv{color:var(--acc);font-weight:600}
.meal-items{padding:0 16px 12px;display:flex;flex-direction:column;gap:6px}
.meal-item{font-size:13px;color:var(--t2);display:flex;gap:8px;align-items:flex-start}
.meal-item::before{content:'·';color:var(--acc);flex-shrink:0;line-height:1.6}
.meal-note{margin:0 16px 12px;background:var(--ora-d);border-left:2px solid var(--ora);border-radius:var(--rss);padding:8px 10px;font-size:12px;color:var(--t2);line-height:1.5}

/* WARMUP & STRETCH CHECK */
.check-row{display:flex;align-items:center;gap:12px;padding:13px 16px}
.check-row-label{font-weight:600;font-size:14px;flex:1}
.mini-check{appearance:none;-webkit-appearance:none;width:24px;height:24px;border-radius:7px;border:2px solid var(--br2);background:transparent;flex-shrink:0;cursor:pointer;transition:all .2s;position:relative}
.mini-check:checked{background:var(--acc);border-color:var(--acc)}
.mini-check:checked::after{content:'';position:absolute;top:3px;left:6px;width:8px;height:12px;border:2.5px solid var(--bg);border-top:none;border-left:none;transform:rotate(40deg)}
.warm-list{padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;border-top:1px solid var(--br)}
.warm-item{display:grid;grid-template-columns:20px 1fr;gap:6px 8px}
.warm-num{color:var(--acc);font-weight:700;font-size:13px;line-height:1.5}
.warm-name{font-size:13px;font-weight:500;color:var(--t1);line-height:1.5}
.warm-desc{grid-column:2;font-size:12px;color:var(--t3);line-height:1.4;margin-top:-4px}

/* EXERCISE CARD */
.ex-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .25s,background .25s}
.ex-card.done{border-color:var(--acc-b);background:var(--acc-d)}
.ex-hdr{display:flex;align-items:center;gap:11px;padding:13px 16px;cursor:pointer;user-select:none}
.ex-check{appearance:none;-webkit-appearance:none;width:24px;height:24px;border-radius:7px;border:2px solid var(--br2);background:transparent;flex-shrink:0;cursor:pointer;transition:all .2s;position:relative}
.ex-check:checked{background:var(--acc);border-color:var(--acc)}
.ex-check:checked::after{content:'';position:absolute;top:3px;left:6px;width:8px;height:12px;border:2.5px solid var(--bg);border-top:none;border-left:none;transform:rotate(40deg)}
.ex-info{flex:1;min-width:0}
.ex-name{font-weight:600;font-size:14px;color:var(--t1);display:block}
.ex-en{font-size:11px;color:var(--t3);margin-top:1px;display:block}
.ex-sets{font-size:12px;color:var(--acc);font-weight:600;margin-top:3px;display:block}
.ex-rest{font-size:11px;color:var(--t3);margin-top:1px;display:block}
.expand-btn{color:var(--t3);font-size:18px;flex-shrink:0;transition:transform .3s;line-height:1}
.ex-card.expanded .expand-btn{transform:rotate(180deg)}
.ex-detail{display:none;padding:0 16px 14px;border-top:1px solid var(--br)}
.ex-card.expanded .ex-detail{display:block}
.dl{margin-top:12px}
.dl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--t3);margin-bottom:6px}
.dl-text{font-size:13px;color:var(--t2);line-height:1.6}
.dl-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.dl-list li{font-size:13px;color:var(--t2);display:flex;gap:8px;line-height:1.5;align-items:flex-start}
.dl-list li .ico{flex-shrink:0;margin-top:2px;font-size:12px}
.weight-box{background:var(--ora-d);border:1px solid var(--ora-b);border-radius:var(--rs);padding:10px 12px;font-size:13px;color:var(--t2);margin-top:6px;line-height:1.55}
.weight-box strong{color:var(--ora)}

/* QUESTIONNAIRE */
.q-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;user-select:none}
.q-hdr-left{display:flex;align-items:center;gap:10px}
.q-hdr-icon{font-size:16px}
.q-hdr-title{font-weight:600;font-size:14px}
.q-body{display:none;padding:0 16px 14px;border-top:1px solid var(--br)}
.q-card.open .q-body{display:block}
.q-item{margin-top:16px}
.q-question{font-size:13px;color:var(--t1);margin-bottom:8px;line-height:1.5;font-weight:500}
.q-opts{display:flex;flex-wrap:wrap;gap:6px}
.q-opt{background:var(--bg2);border:1px solid var(--br);color:var(--t2);padding:6px 12px;border-radius:99px;font-size:12px;cursor:pointer;font-family:var(--fb);transition:all .2s;line-height:1.3}
.q-opt.sel{background:var(--acc-d);border-color:var(--acc-b);color:var(--acc)}
.q-textarea{width:100%;background:var(--bg2);border:1px solid var(--br);color:var(--t1);padding:10px 12px;border-radius:var(--rs);font-size:13px;font-family:var(--fb);resize:none;min-height:60px;margin-top:8px}
.q-textarea:focus{outline:none;border-color:var(--acc)}
.q-saved{font-size:11px;color:var(--acc);margin-top:6px;opacity:0;transition:opacity .3s}
.q-saved.show{opacity:1}

/* REST DAY */
.rest-hero{background:linear-gradient(135deg,rgba(0,212,168,.07),transparent 70%);border:1px solid var(--acc-b);border-radius:var(--r);padding:22px 20px;text-align:center;margin-bottom:14px}
.rest-emoji{font-size:36px;margin-bottom:8px}
.rest-title{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--acc)}
.rest-sub{font-size:13px;color:var(--t2);margin-top:6px;line-height:1.6}
.tip-card{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;margin-bottom:8px}
.tip-title{font-weight:600;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.tip-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.tip-list li{font-size:13px;color:var(--t2);display:flex;gap:10px;line-height:1.5;align-items:flex-start}
.tip-ico{flex-shrink:0;margin-top:2px}
.rib-item{background:var(--bg2);border-radius:var(--rs);padding:10px 12px;margin-bottom:6px}
.rib-name{font-size:13px;font-weight:600;color:var(--acc);margin-bottom:3px}
.rib-desc{font-size:12px;color:var(--t2);line-height:1.5}

/* COMPLETION */
.complete-overlay{position:fixed;inset:0;background:rgba(7,8,15,.88);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .35s}
.complete-overlay.show{opacity:1;pointer-events:all}
.complete-card{background:var(--bg2);border:1px solid var(--acc-b);border-radius:24px;padding:36px 28px;text-align:center;max-width:320px;width:100%;transform:scale(.88);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.complete-overlay.show .complete-card{transform:scale(1)}
.complete-emoji{font-size:56px;margin-bottom:12px;display:block}
.complete-title{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--acc)}
.complete-sub{font-size:14px;color:var(--t2);margin-top:8px;line-height:1.6}
.complete-close{margin-top:22px;background:var(--acc);color:var(--bg);border:none;padding:13px 28px;border-radius:99px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--fb);width:100%}

/* EXPORT BTN */
.export-fab{position:fixed;bottom:24px;right:20px;background:var(--bg2);border:1px solid var(--br2);color:var(--t2);padding:11px 18px;border-radius:99px;font-size:13px;font-weight:500;cursor:pointer;font-family:var(--fb);display:flex;align-items:center;gap:7px;z-index:50;box-shadow:0 6px 24px rgba(0,0,0,.4)}

.divider{height:1px;background:var(--br);margin:18px 0}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">
    <div class="app-title">MOYA FIT</div>
    <div class="app-sub">第一个月 · 身体重组计划</div>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙ 设置</button>
</header>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-row">
    <span class="settings-label">开始日期</span>
    <input type="date" class="settings-input" id="startDateInput" onchange="onStartDateChange(this.value)">
  </div>
  <div class="settings-row">
    <span class="settings-label">当前第几周</span>
    <div class="week-pills" id="weekPills">
      <div class="week-pill" data-w="1" onclick="selectWeek(1)">第1周</div>
      <div class="week-pill" data-w="2" onclick="selectWeek(2)">第2周</div>
      <div class="week-pill" data-w="3" onclick="selectWeek(3)">第3周</div>
      <div class="week-pill" data-w="4" onclick="selectWeek(4)">第4周</div>
    </div>
  </div>
  <div class="settings-note">📌 设置开始日期后，系统会自动推算当前是第几周。你也可以手动选择周数。</div>
</div>

<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-row">
    <span>今日训练进度</span>
    <span class="progress-count" id="progressText">0 / 0</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="day-tabs-wrap">
  <div class="day-tabs" id="dayTabs">
    <div class="day-tab training" data-day="monday" onclick="selectDay('monday')">
      <span class="tab-label">周一</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab" data-day="tuesday" onclick="selectDay('tuesday')">
      <span class="tab-label">周二</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab training" data-day="wednesday" onclick="selectDay('wednesday')">
      <span class="tab-label">周三</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab training" data-day="thursday" onclick="selectDay('thursday')">
      <span class="tab-label">周四</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab" data-day="friday" onclick="selectDay('friday')">
      <span class="tab-label">周五</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab" data-day="saturday" onclick="selectDay('saturday')">
      <span class="tab-label">周六</span><span class="tab-dot"></span>
    </div>
    <div class="day-tab" data-day="sunday" onclick="selectDay('sunday')">
      <span class="tab-label">周日</span><span class="tab-dot"></span>
    </div>
  </div>
</div>

<div id="content"></div>

<div class="complete-overlay" id="completeOverlay">
  <div class="complete-card">
    <span class="complete-emoji">🏆</span>
    <div class="complete-title">今日完成！</div>
    <div class="complete-sub" id="completeMsg">棒！每一次完成训练，都是向目标更近一步。</div>
    <button class="complete-close" onclick="closeComplete()">继续加油</button>
  </div>
</div>

<button class="export-fab" onclick="exportData()">📊 导出训练数据</button>

<script>

  inclinePress:{

let state = {
  selectedDay: 'monday',
  selectedWeek: 1,
  startDate: null
};

const DAYS = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
const DAY_NAMES = {monday:'周一',tuesday:'周二',wednesday:'周三',thursday:'周四',friday:'周五',saturday:'周六',sunday:'周日'};
const TRAINING_DAYS = ['monday','wednesday','thursday'];
const JS_DAY_MAP = {0:'sunday',1:'monday',2:'tuesday',3:'wednesday',4:'thursday',5:'friday',6:'saturday'};

function getTodayDay() {
  return JS_DAY_MAP[new Date().getDay()];
}

function sk(type, id) {
  return `fitplan_w${state.selectedWeek}_${state.selectedDay}_${type}_${id}`;
}

function lsGet(key){ try{ return localStorage.getItem(key) }catch(e){ return null } }
function lsSet(key,val){ try{ localStorage.setItem(key,val) }catch(e){} }

// =========================================
// INIT
// =========================================

function init() {
  const saved = lsGet('fitplan_startDate');
  if(saved){ state.startDate = saved; document.getElementById('startDateInput').value = saved; }

  const savedWeek = lsGet('fitplan_currentWeek');
  if(savedWeek) state.selectedWeek = parseInt(savedWeek);
  else if(state.startDate) state.selectedWeek = calcWeek(state.startDate);

  updateWeekPills();

  const today = getTodayDay();
  state.selectedDay = today;
  updateTabs();
  render();
}

function calcWeek(startDateStr) {
  if(!startDateStr) return 1;
  const start = new Date(startDateStr);
  const now = new Date();
  const diff = Math.floor((now - start) / (7*24*3600*1000));
  return Math.max(1, Math.min(4, diff + 1));
}

// =========================================
// SETTINGS
// =========================================

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

function onStartDateChange(val) {
  state.startDate = val;
  lsSet('fitplan_startDate', val);
  const w = calcWeek(val);
  selectWeek(w);
}

function selectWeek(w) {
  state.selectedWeek = w;
  lsSet('fitplan_currentWeek', w);
  updateWeekPills();
  render();
}

function updateWeekPills() {
  document.querySelectorAll('.week-pill').forEach(p => {
    p.classList.toggle('active', parseInt(p.dataset.w) === state.selectedWeek);
  });
}

// =========================================
// TABS
// =========================================

function selectDay(day) {
  state.selectedDay = day;
  updateTabs();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateTabs() {
  const today = getTodayDay();
  document.querySelectorAll('.day-tab').forEach(t => {
    const d = t.dataset.day;
    t.classList.toggle('active', d === state.selectedDay);
    t.classList.toggle('today', d === today);
    t.classList.toggle('training', TRAINING_DAYS.includes(d));
  });
}

function render() {
  const d = state.selectedDay;
  const w = state.selectedWeek;
  const isTraining = TRAINING_DAYS.includes(d);

  // Progress bar
  const pw = document.getElementById('progressWrap');
  pw.style.display = isTraining ? '' : 'none';

  const content = document.getElementById('content');
  if(isTraining) {
    content.innerHTML = renderTrainingDay(d, w);
    updateProgress();
    bindTrainingEvents(d, w);
  } else {
    content.innerHTML = renderRestDay(d);
    updateProgress();
  }
}

  lsSet(key, el.checked ? '1' : '0');
  if(exId) {
    const card = document.getElementById('excard-' + exId);
    if(card) card.classList.toggle('done', el.checked);
  }
  updateProgress();
}

function selectOpt(btn, key, val) {
  const parent = btn.closest('.q-opts');
  parent.querySelectorAll('.q-opt').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  lsSet(key, val);
  const saved = document.getElementById('qSaved');
  if(saved) { saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 2000); }
}

function saveText(key, val) {
  lsSet(key, val);
  const saved = document.getElementById('qSaved');
  if(saved) { saved.classList.add('show'); setTimeout(()=>saved.classList.remove('show'), 2000); }
}

// =========================================
// PROGRESS
// =========================================

function updateProgress() {
  const d = state.selectedDay;
  const w = state.selectedWeek;
  const isTraining = TRAINING_DAYS.includes(d);

  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');

  if(!isTraining || !fill || !text) return;

  const session = PLAN.sessions[d];
  const exercises = w <= 2 ? session.w12 : session.w34;

  // Count: warmup + each exercise + stretch
  const totalItems = 1 + exercises.length + 1;
  let checkedCount = 0;

  const warmupKey = sk('check', 'warmup');
  if(lsGet(warmupKey) === '1') checkedCount++;

  exercises.forEach(item => {
    const ex = EXERCISES[item.ex];
    if(!ex) return;
    const k = sk('check', ex.id);
    if(lsGet(k) === '1') checkedCount++;
  });

  const stretchKey = sk('check', 'stretch');
  if(lsGet(stretchKey) === '1') checkedCount++;

  const pct = totalItems > 0 ? Math.round(checkedCount / totalItems * 100) : 0;
  fill.style.width = pct + '%';
  text.textContent = checkedCount + ' / ' + totalItems;

  if(checkedCount === totalItems && totalItems > 0) {
    setTimeout(showComplete, 500);
  }
}

function showComplete() {
  const ov = document.getElementById('completeOverlay');
  const msgs = COMPLETE_MSGS[state.selectedDay] || ['今日训练完成！'];
  const msg = msgs[Math.floor(Math.random() * msgs.length)];
  document.getElementById('completeMsg').textContent = msg;
  ov.classList.add('show');
}

function closeComplete() {
  document.getElementById('completeOverlay').classList.remove('show');
}

// =========================================
// UTILS
// =========================================

function getDateStr(day) {
  if(!state.startDate) return '';
  const start = new Date(state.startDate);
  const dayIdx = DAYS.indexOf(day);
  const startDayIdx = start.getDay() === 0 ? 6 : start.getDay() - 1;
  const weekStart = new Date(start);
  weekStart.setDate(start.getDate() - startDayIdx + (state.selectedWeek - 1) * 7);
  const target = new Date(weekStart);
  target.setDate(weekStart.getDate() + dayIdx);
  return target.toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'long'});
}

// =========================================
// EXPORT
// =========================================

function exportData() {
  const log = {};
  for(let w=1; w<=4; w++) {
    log['week'+w] = {};
    DAYS.forEach(d => {
      const isTraining = TRAINING_DAYS.includes(d);
      const prefix = `fitplan_w${w}_${d}_`;
      const dayData = { type: isTraining ? 'training' : 'rest', checks:{}, questionnaire:{} };

      // Collect all relevant keys
      for(let key in localStorage) {
        if(key.startsWith(prefix)) {
          const sub = key.replace(prefix,'');
          if(sub.startsWith('check_')) dayData.checks[sub.replace('check_','')] = localStorage[key];
          else if(sub.startsWith('q_')) dayData.questionnaire[sub.replace('q_','')] = localStorage[key];
        }
      }
      log['week'+w][d] = dayData;
    });
  }

  const exportObj = {
    exportDate: new Date().toISOString().split('T')[0],
    startDate: state.startDate || '未设置',
    currentWeek: state.selectedWeek,
    trainingLog: log,
    _note: '请将此文件发送给 Claude 用于调整下个月训练计划'
  };

  const blob = new Blob([JSON.stringify(exportObj, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `训练记录_第${state.selectedWeek}周_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// =========================================
// BOOT
// =========================================

document.addEventListener('DOMContentLoaded', init);
</script>
