<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>训练计划 · Month 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0c;
    --bg2: #111114;
    --bg3: #18181d;
    --bg4: #1f1f26;
    --border: #2a2a35;
    --border2: #3a3a48;
    --accent: #7b6fff;
    --accent2: #5b4fff;
    --accent-glow: rgba(123,111,255,0.15);
    --green: #3ddc84;
    --green-dim: rgba(61,220,132,0.12);
    --red: #ff6b6b;
    --orange: #ff9a3c;
    --yellow: #ffd166;
    --text: #e8e8f0;
    --text2: #9090a8;
    --text3: #5a5a70;
    --card-r: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: linear-gradient(180deg, #12121a 0%, var(--bg) 100%);
    padding: 20px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo span { color: var(--accent); }

  .week-selector {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 5px 12px;
    cursor: pointer;
  }

  .week-selector select {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    cursor: pointer;
    outline: none;
    -webkit-appearance: none;
    padding-right: 4px;
  }

  .week-selector select option { background: #1a1a22; }

  .week-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 0;
  }
  .day-tabs::-webkit-scrollbar { display: none; }

  .day-tab {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 12px 12px;
    cursor: pointer;
    position: relative;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    min-width: 44px;
  }

  .day-tab.active { border-bottom-color: var(--accent); }
  .day-tab.active .day-name { color: var(--accent); }
  .day-tab.active .day-num { color: var(--text); }
  .day-tab.rest-day .day-num { color: var(--text3); }
  .day-tab.rest-day .day-name { color: var(--text3); }
  .day-tab.today .day-num-wrap { position: relative; }
  .day-tab.today .day-num-wrap::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }

  .day-name {
    font-size: 10px;
    color: var(--text3);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .day-num {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text2);
  }

  .day-done-dot {
    width: 5px; height: 5px;
    background: var(--green);
    border-radius: 50%;
    margin-top: 3px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .day-done-dot.show { opacity: 1; }

  /* CONTENT */
  .content {
    padding: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* DAY HEADER */
  .day-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .day-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    line-height: 1;
    letter-spacing: -1px;
  }

  .day-subtitle {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
    font-weight: 300;
  }

  .day-badge {
    background: var(--accent-glow);
    border: 1px solid rgba(123,111,255,0.3);
    color: var(--accent);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
    white-space: nowrap;
  }

  .day-badge.rest { background: rgba(90,90,112,0.15); border-color: var(--border); color: var(--text3); }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 12px 14px;
    margin-bottom: 12px;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .progress-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.5px; }
  .progress-count { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--accent); }

  .progress-bar-bg {
    width: 100%;
    height: 4px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* SECTION CARD */
  .section-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    margin-bottom: 10px;
    overflow: hidden;
  }

  .section-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
  }

  .section-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  .section-icon.food { background: rgba(255,154,60,0.15); }
  .section-icon.warmup { background: rgba(255,100,100,0.12); }
  .section-icon.train { background: rgba(123,111,255,0.15); }
  .section-icon.stretch { background: rgba(61,220,132,0.12); }
  .section-icon.survey { background: rgba(255,209,102,0.12); }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }

  .section-meta {
    font-size: 11px;
    color: var(--text3);
    font-weight: 300;
  }

  .section-chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .section-chevron.open { transform: rotate(180deg); }

  .section-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .section-body.open { display: block; }

  /* MEAL CARD */
  .meal-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .meal-item:last-child { border-bottom: none; }

  .meal-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }

  .meal-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 6px;
    font-weight: 300;
  }

  .meal-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .meal-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .meal-tag.kcal { background: rgba(255,209,102,0.12); color: var(--yellow); border: 1px solid rgba(255,209,102,0.2); }
  .meal-tag.protein { background: rgba(123,111,255,0.1); color: var(--accent); border: 1px solid rgba(123,111,255,0.2); }
  .meal-tag.price { background: rgba(61,220,132,0.08); color: var(--green); border: 1px solid rgba(61,220,132,0.15); }

  /* WARMUP ITEMS */
  .warmup-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .warmup-item:last-child { border-bottom: none; }

  .warmup-dot {
    width: 6px; height: 6px;
    background: var(--red);
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .warmup-text { font-size: 13px; color: var(--text2); flex: 1; line-height: 1.4; }
  .warmup-time { font-size: 11px; color: var(--text3); flex-shrink: 0; font-family: 'Syne', sans-serif; font-weight: 600; }

  /* EXERCISE ITEMS */
  .exercise-item {
    border-bottom: 1px solid var(--border);
  }
  .exercise-item:last-child { border-bottom: none; }

  .exercise-main {
    padding: 12px 14px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
  }

  .exercise-checkbox {
    width: 22px; height: 22px;
    border: 1.5px solid var(--border2);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
    cursor: pointer;
  }

  .exercise-checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }

  .exercise-checkbox .check-icon {
    opacity: 0;
    font-size: 12px;
    transition: opacity 0.2s;
  }
  .exercise-checkbox.checked .check-icon { opacity: 1; }

  .exercise-info { flex: 1; }

  .exercise-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .exercise-sets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .exercise-set-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 8px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
  }

  .exercise-set-tag.sets { background: rgba(123,111,255,0.12); color: var(--accent); }
  .exercise-set-tag.reps { background: rgba(255,154,60,0.1); color: var(--orange); }
  .exercise-set-tag.rest { background: var(--bg4); color: var(--text3); }
  .exercise-set-tag.muscle { background: rgba(61,220,132,0.08); color: var(--green); }

  .exercise-expand-btn {
    font-size: 10px;
    color: var(--text3);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-top: 6px;
    display: inline-block;
    transition: all 0.2s;
  }

  .exercise-chevron {
    color: var(--text3);
    font-size: 11px;
    margin-top: 3px;
    flex-shrink: 0;
    transition: transform 0.2s;
  }
  .exercise-chevron.open { transform: rotate(180deg); }

  .exercise-detail {
    display: none;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
  }
  .exercise-detail.open { display: block; }

  .detail-block {
    margin-bottom: 10px;
  }
  .detail-block:last-child { margin-bottom: 0; }

  .detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .detail-label.feel { color: var(--accent); }
  .detail-label.how { color: var(--green); }
  .detail-label.wrong { color: var(--red); }
  .detail-label.weight { color: var(--yellow); }

  .detail-text {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
    font-weight: 300;
  }

  .detail-list {
    list-style: none;
    padding: 0;
  }

  .detail-list li {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    padding: 2px 0;
    padding-left: 12px;
    position: relative;
    font-weight: 300;
  }

  .detail-list li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text3);
  }

  /* STRETCH */
  .stretch-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .stretch-item:last-child { border-bottom: none; }

  .stretch-dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.8;
  }

  .stretch-text { font-size: 13px; color: var(--text2); flex: 1; line-height: 1.4; }
  .stretch-time { font-size: 11px; color: var(--text3); flex-shrink: 0; font-family: 'Syne', sans-serif; font-weight: 600; }

  /* SURVEY */
  .survey-item {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .survey-item:last-child { border-bottom: none; }

  .survey-q {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 10px;
    font-weight: 500;
    line-height: 1.5;
  }

  .survey-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .survey-opt {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    font-family: 'Noto Sans SC', sans-serif;
  }

  .survey-opt:active { transform: scale(0.97); }
  .survey-opt.selected { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  .survey-text-input {
    width: 100%;
    background: var(--bg4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 12px;
    resize: none;
    outline: none;
    margin-top: 8px;
    min-height: 60px;
    transition: border-color 0.2s;
  }

  .survey-text-input:focus { border-color: var(--accent); }
  .survey-text-input::placeholder { color: var(--text3); }

  /* REST DAY */
  .rest-content {
    padding: 16px;
  }

  .rest-hero {
    text-align: center;
    padding: 24px 0 20px;
  }

  .rest-emoji { font-size: 40px; margin-bottom: 12px; }

  .rest-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
  }

  .rest-desc { font-size: 13px; color: var(--text2); line-height: 1.6; font-weight: 300; }

  .rest-tips {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    margin-bottom: 12px;
    overflow: hidden;
  }

  .rest-tip-head {
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text2);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  .rest-tip-item {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .rest-tip-item:last-child { border-bottom: none; }
  .rest-tip-icon { font-size: 16px; flex-shrink: 0; }
  .rest-tip-text { font-size: 13px; color: var(--text2); line-height: 1.5; font-weight: 300; }

  /* COMPLETION BANNER */
  .completion-banner {
    display: none;
    background: linear-gradient(135deg, rgba(61,220,132,0.15), rgba(123,111,255,0.1));
    border: 1px solid rgba(61,220,132,0.3);
    border-radius: var(--card-r);
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
    animation: bannerIn 0.4s ease;
  }

  @keyframes bannerIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .completion-banner.show { display: block; }

  .completion-emoji { font-size: 32px; margin-bottom: 8px; }
  .completion-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--green);
    margin-bottom: 4px;
  }
  .completion-sub { font-size: 12px; color: var(--text2); font-weight: 300; }

  /* EXPORT BUTTON */
  .export-btn {
    width: 100%;
    padding: 14px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    color: var(--text2);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    transition: all 0.2s;
  }
  .export-btn:active { background: var(--bg4); transform: scale(0.99); }
  .export-btn .export-icon { font-size: 16px; }

  /* KCAL INFO */
  .daily-kcal {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 10px 14px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .daily-kcal-label { font-size: 11px; color: var(--text3); font-weight: 500; letter-spacing: 0.5px; }

  .daily-kcal-nums {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .daily-kcal-num {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }

  .kcal-in { color: var(--yellow); }
  .kcal-burn { color: var(--accent); }
  .kcal-sep { color: var(--text3); font-size: 10px; }

  /* SMOOTH */
  * { -webkit-font-smoothing: antialiased; }

  .section-card { transition: box-shadow 0.2s; }
  .section-card:active { box-shadow: 0 0 0 1px var(--border2); }

  /* Scroll padding for sticky header */
  html { scroll-padding-top: 140px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">BODY<span>01</span></div>
    <div class="week-selector">
      <div class="week-dot"></div>
      <select id="weekSelect" onchange="changeWeek(this.value)">
        <option value="1">第 1 周</option>
        <option value="2">第 2 周</option>
        <option value="3">第 3 周</option>
        <option value="4">第 4 周</option>
      </select>
      <span style="color:var(--text3);font-size:12px;">▾</span>
    </div>
  </div>
  <div class="day-tabs" id="dayTabs"></div>
</div>

<div class="content" id="mainContent"></div>

<script>
// ============================================================
// DATA
// ============================================================

const PLAN = {
  // 周一：推 - 胸+肩+三头
  1: {
    title: "推力日",
    subtitle: "胸 · 肩 · 三头",
    badge: "A 训练",
    kcal_burn: 280,
    kcal_total: 1800,
    warmup: [
      { text: "手臂绕环：向前+向后各15圈，激活肩关节", time: "1min" },
      { text: "猫牛式：脊柱热身，关注胸口展开", time: "1min" },
      { text: "跪姿俯卧撑 × 10次：激活胸肌和肩部", time: "1min" },
      { text: "弹力带侧平举 × 15次（轻）：激活三角肌中束", time: "1min" },
      { text: "胸椎旋转拉伸：坐姿，双手抱头，左右各8次", time: "1min" }
    ],
    exercises: [
      {
        id: "incline_db_press",
        name: "上斜哑铃卧推",
        sets: "3", reps: "10–12", rest: "90s", muscle: "上胸 · 肩前束",
        feel: "胸口上方（锁骨附近）和肩膀正前方有明显被拉伸和收缩感，不是肩膀顶部酸",
        how: [
          "调椅背约30–45°，背部贴靠，腰部自然弓起不要悬空",
          "哑铃落在乳头线上方约5cm处，肘部夹角约75°（不要完全打开90°）",
          "推起时哑铃轨迹略往内收，顶端不完全锁死，留有张力",
          "下放时感受上胸被拉开，控制速度2秒下降"
        ],
        wrong: [
          "耸肩：肩膀跑到耳朵边→下压肩胛骨再推",
          "手腕折叠：腕关节要中立，哑铃握在掌心下方",

// ============================================================
// STATE
// ============================================================

let currentWeek = 1;
let currentDayIndex = 0;

function getKey(week, dayIndex) { return `w${week}_d${dayIndex}`; }

function loadState(week, dayIndex) {
  try {
    const raw = localStorage.getItem(getKey(week, dayIndex));
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveState(week, dayIndex, state) {
  try {
    localStorage.setItem(getKey(week, dayIndex), JSON.stringify(state));
  } catch {}
}

function getExerciseChecked(week, dayIndex, exId) {
  return loadState(week, dayIndex)['ex_' + exId] === true;
}

function setExerciseChecked(week, dayIndex, exId, val) {
  const s = loadState(week, dayIndex);
  s['ex_' + exId] = val;
  saveState(week, dayIndex, s);
}

function getSurveyAnswer(week, dayIndex, qId) {
  return loadState(week, dayIndex)['sq_' + qId] || '';
}

function setSurveyAnswer(week, dayIndex, qId, val) {
  const s = loadState(week, dayIndex);
  s['sq_' + qId] = val;
  saveState(week, dayIndex, s);
}

function buildTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  const today = new Date();
  const todayDow = today.getDay(); // 0=Sun
  const todayDate = today.getDate();

  // Show Mon=1 through Sun=0 as Mon Tue Wed Thu Fri Sat Sun
  const order = [1,2,3,4,5,6,0];

  order.forEach(dow => {
    const tab = document.createElement('div');
    const isToday = (dow === todayDow);
    const isActive = (dow === currentDayIndex);
    const plan = PLAN[dow];
    const isRest = !plan || plan.rest;

    tab.className = `day-tab${isActive ? ' active' : ''}${isRest ? ' rest-day' : ''}${isToday ? ' today' : ''}`;
    tab.innerHTML = `
      <div class="day-name">${DAYS[dow]}</div>
      <div class="day-num-wrap"><div class="day-num">${isToday ? todayDate : ''}</div></div>
      <div class="day-done-dot" id="done-dot-${dow}"></div>
    `;
    tab.addEventListener('click', () => {
      currentDayIndex = dow;
      buildTabs();
      buildContent();
    });
    container.appendChild(tab);
  });

  // Update done dots
  order.forEach(dow => {
    const plan = PLAN[dow];
    if (!plan || plan.rest) return;
    const dot = document.getElementById('done-dot-' + dow);
    if (!dot) return;
    const allDone = plan.exercises.every(ex => getExerciseChecked(currentWeek, dow, ex.id));
    dot.className = 'day-done-dot' + (allDone ? ' show' : '');
  });
}

function toggleSection(head) {
  const body = head.nextElementSibling;
  const chevron = head.querySelector('.section-chevron');
  body.classList.toggle('open');
  chevron.classList.toggle('open');
}

function toggleDetail(exId) {
  const detail = document.getElementById('detail-' + exId);
  detail.classList.toggle('open');
}

function toggleExercise(exId, event) {
  event.stopPropagation();
  const current = getExerciseChecked(currentWeek, currentDayIndex, exId);
  setExerciseChecked(currentWeek, currentDayIndex, exId, !current);
  buildContent();
  buildTabs();
}

function selectSurvey(qId, val, btn) {
  setSurveyAnswer(currentWeek, currentDayIndex, qId, val);
  const parent = btn.closest('.survey-options');
  parent.querySelectorAll('.survey-opt').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function setSurveyText(qId, val) {
  setSurveyAnswer(currentWeek, currentDayIndex, qId + '_text', val);
}

function changeWeek(w) {
  currentWeek = parseInt(w);
  buildTabs();
  buildContent();
}

// ============================================================
// EXPORT
// ============================================================

function exportData() {
  const allData = {};
  for (let w = 1; w <= 4; w++) {
    allData['week' + w] = {};
    for (let d = 0; d <= 6; d++) {
      const s = loadState(w, d);
      if (Object.keys(s).length > 0) {
        allData['week' + w]['day' + d] = s;
      }
    }
  }

  // 生成可读报告
  let report = '=== BODY01 训练数据导出 ===\n';
  report += `导出时间：${new Date().toLocaleString('zh-CN')}\n\n`;

  for (let w = 1; w <= 4; w++) {
    const wData = allData['week' + w];
    const hasData = Object.keys(wData).some(d => Object.keys(wData[d]).length > 0);
    if (!hasData) continue;

    report += `── 第 ${w} 周 ──\n`;
    const dayMap = {1:'周一(推)', 2:'周二(拉)', 3:'周三(腿/核心)', 4:'周四(全身/有氧)'};

    for (let d = 1; d <= 4; d++) {
      const dData = wData['day' + d];
      if (!dData || Object.keys(dData).length === 0) continue;
      report += `\n${dayMap[d]}:\n`;

      const plan = PLAN[d];
      if (plan && plan.exercises) {
        plan.exercises.forEach(ex => {
          const done = dData['ex_' + ex.id];
          report += `  [${done ? '✓' : '○'}] ${ex.name}\n`;
        });
      }

      if (plan && plan.survey) {
        report += '  反馈问卷:\n';
        plan.survey.forEach(q => {
          const ans = dData['sq_' + q.id];
          if (ans) report += `    ${q.q} → ${ans}\n`;
          const textAns = dData['sq_' + q.id + '_text'];
          if (textAns) report += `    备注：${textAns}\n`;
        });
      }
    }
    report += '\n';
  }

  // 统计
  let totalDone = 0, totalEx = 0;
  for (let w = 1; w <= 4; w++) {
    for (let d = 1; d <= 4; d++) {
      const plan = PLAN[d];
      if (!plan || !plan.exercises) continue;
      plan.exercises.forEach(ex => {
        totalEx++;
        if (loadState(w, d)['ex_' + ex.id]) totalDone++;
      });
    }
  }
  report += `── 整体统计 ──\n完成率：${totalDone}/${totalEx} (${totalEx > 0 ? Math.round(totalDone/totalEx*100) : 0}%)\n`;

  // 下载
  const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `训练记录_${new Date().toLocaleDateString('zh-CN').replace(/\//g,'-')}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// INIT
// ============================================================

function init() {
  const today = new Date().getDay();
  // Default to today if it's a training day, else Mon
  const trainingDays = [1,2,3,4];
  if (trainingDays.includes(today)) {
    currentDayIndex = today;
  } else {
    currentDayIndex = today; // show whatever day it is (rest day)
  }

  // Set week selector
  document.getElementById('weekSelect').value = currentWeek;

  buildTabs();
  buildContent();

  // Scroll today tab into view
  setTimeout(() => {
    const tabs = document.querySelectorAll('.day-tab');
    tabs.forEach(t => {
      if (t.classList.contains('active')) {
        t.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    });
  }, 100);
}

init();
</script>
